<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>暗潮 · 地下组织模拟器</title>
<style>
/* ===== CSS Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #22223a;
    --bg-card: #2a2a45;
    --bg-card-hover: #333355;
    --bg-tertiary: #1e1e36;
    --text-primary: #eee8ff;
    --text-secondary: #c8b8e0;
    --text-muted: #9888a8;
    --accent-purple: #a78bfa;
    --accent-purple2: #7c3aed;
    --accent-gold: #fbbf24;
    --accent-red: #f87171;
    --accent-green: #34d399;
    --accent-blue: #60a5fa;
    --accent-cyan: #22d3ee;
    --accent-pink: #f472b6;
    --border-color: #3a3a55;
    --border-glow: rgba(167, 139, 250, 0.3);
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
    --radius: 12px;
    --radius-sm: 8px;
    --nav-height: 64px;
    --topbar-height: 92px;
}
html, body {
    height: 100%; width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 4px; }

/* ===== Start Screen ===== */
.start-screen {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
    position: relative; overflow: hidden;
}
.start-bg-particle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--accent-purple);
    border-radius: 50%;
    animation: float 6s infinite ease-in-out;
    opacity: 0.3;
}
@keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
    50% { transform: translateY(-20px) scale(1.5); opacity: 0.8; }
}
.start-content {
    text-align: center; z-index: 1;
    padding: 20px; max-width: 360px;
}
.start-logo {
    margin-bottom: 24px;
}
.start-logo-icon {
    font-size: 64px; margin-bottom: 8px;
    animation: pulse 3s infinite ease-in-out;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.8; }
}
.start-title {
    font-size: 48px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 8px; text-shadow: 0 0 40px rgba(139,92,246,0.3);
}
.start-subtitle {
    font-size: 14px; letter-spacing: 6px;
    color: var(--text-muted); margin-top: 4px;
}
.start-tagline {
    font-size: 14px; color: var(--text-secondary);
    margin-bottom: 32px; line-height: 1.6;
}
.start-buttons {
    display: flex; flex-direction: column; gap: 12px;
}
.btn-start {
    padding: 14px 32px; border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple2));
    color: white; transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(139,92,246,0.3);
}
.btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(139,92,246,0.5);
}
.btn-start-secondary {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    box-shadow: none;
}
.btn-start-secondary:hover {
    border-color: var(--accent-purple);
    color: var(--text-primary);
    box-shadow: 0 4px 15px rgba(139,92,246,0.2);
}
.start-version {
    margin-top: 24px; font-size: 11px;
    color: var(--text-muted); letter-spacing: 2px;
}
.start-footer {
    position: absolute; bottom: 20px;
    font-size: 12px; color: var(--text-muted);
    opacity: 0.5;
}

/* ===== Game Screen ===== */
.game-screen {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    background: var(--bg-primary);
}

/* ===== Top Bar ===== */
.top-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 8px 12px;
    flex-shrink: 0;
    z-index: 100;
}
.resource-bar {
    display: flex; flex-wrap: wrap; gap: 4px 10px;
    margin-bottom: 4px;
}
.resource-item {
    display: flex; align-items: center; gap: 3px;
    font-size: 12px; cursor: pointer;
    padding: 2px 6px; border-radius: 4px;
    transition: background 0.2s;
}
.resource-item:hover { background: var(--bg-card); }
.resource-emoji { font-size: 13px; }
.resource-value { font-weight: 600; color: var(--text-primary); }
.info-bar {
    display: flex; flex-wrap: wrap; gap: 8px 14px;
    align-items: center; font-size: 11px;
    color: var(--text-secondary);
}
.info-item { display: flex; align-items: center; gap: 3px; }
.info-label { font-size: 12px; }
.ap-bar { flex: 1; min-width: 80px; }
.ap-fill-bar {
    width: 60px; height: 4px;
    background: var(--bg-card); border-radius: 2px;
    overflow: hidden; margin-left: 4px;
}
.ap-fill {
    height: 100%; background: var(--accent-gold);
    border-radius: 2px; transition: width 0.3s;
}

/* ===== Message Log ===== */
.message-log {
    flex-shrink: 0;
    max-height: 80px; overflow-y: auto;
    padding: 4px 12px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border-color);
    font-size: 11px; line-height: 1.5;
}
.message-log .msg { padding: 1px 0; }
.msg-success { color: var(--accent-green); }
.msg-error { color: var(--accent-red); }
.msg-info { color: var(--accent-cyan); }
.msg-warning { color: var(--accent-gold); }
.msg-special { color: var(--accent-pink); }
.msg-ending {
    color: var(--accent-gold);
    font-weight: bold;
    animation: glow 1.5s infinite alternate;
}
@keyframes glow {
    from { text-shadow: 0 0 5px var(--accent-gold); }
    to { text-shadow: 0 0 15px var(--accent-gold), 0 0 25px var(--accent-purple); }
}

/* ===== Tab Content ===== */
.tab-content {
    flex: 1; overflow-y: auto;
    padding: 12px; padding-bottom: calc(var(--nav-height) + 12px);
}

/* ===== Bottom Nav ===== */
.bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-height);
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    display: flex; z-index: 200;
}
.nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    padding: 6px 0; transition: all 0.2s;
    font-size: 10px; position: relative;
}
.nav-btn.active {
    color: var(--accent-purple);
}
.nav-btn.active::after {
    content: ''; position: absolute; top: 0;
    left: 20%; right: 20%; height: 2px;
    background: var(--accent-purple);
    border-radius: 0 0 2px 2px;
}
.nav-icon { font-size: 20px; }
.nav-label { font-weight: 500; }

/* ===== Cards ===== */
.card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px;
    transition: all 0.2s;
}
.card:hover { border-color: var(--border-glow); }
.card-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 8px;
}
.card-title { font-weight: 600; font-size: 14px; }
.card-subtitle { font-size: 11px; color: var(--text-muted); }

/* ===== Buttons ===== */
.btn, .btn-sm {
    border: none; border-radius: var(--radius-sm);
    cursor: pointer; font-weight: 600;
    transition: all 0.2s;
    text-align: center; display: inline-block;
}
.btn {
    padding: 10px 20px; font-size: 13px;
}
.btn-sm {
    padding: 6px 12px; font-size: 11px;
}
.btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a1a2e; }
.btn-gold:hover { box-shadow: 0 2px 12px rgba(245,158,11,0.4); transform: translateY(-1px); }
.btn-purple { background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple2)); color: white; }
.btn-purple:hover { box-shadow: 0 2px 12px rgba(139,92,246,0.4); }
.btn-red { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
.btn-red:hover { box-shadow: 0 2px 12px rgba(239,68,68,0.4); }
.btn-green { background: linear-gradient(135deg, #10b981, #059669); color: white; }
.btn-gray { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-color); }
.btn-gray:hover { background: var(--bg-card-hover); }
.btn:disabled, .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ===== Modal ===== */
.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; animation: fadeIn 0.2s;
    padding: 16px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    max-width: 400px; width: 100%;
    max-height: 80vh; overflow-y: auto;
    box-shadow: var(--shadow);
}
.modal-header {
    display: flex; justify-content: space-between;
    align-items: center; padding: 14px 16px;
    border-bottom: 1px solid var(--border-color);
}
.modal-title { font-size: 16px; font-weight: 700; }
.btn-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 18px; cursor: pointer; padding: 4px;
}
.btn-close:hover { color: var(--text-primary); }

/* ===== Event Modal ===== */
.event-modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 1100; animation: fadeIn 0.3s;
    padding: 16px;
}
.event-modal {
    background: var(--bg-secondary);
    border: 1px solid var(--accent-purple);
    border-radius: var(--radius);
    max-width: 420px; width: 100%;
    box-shadow: 0 0 30px rgba(139,92,246,0.3);
    overflow: hidden;
}
.event-header {
    padding: 16px; text-align: center;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px;
}
.event-icon { font-size: 36px; }
.event-header h2 { font-size: 18px; color: white; }
.event-body { padding: 16px; }
.event-desc {
    font-size: 13px; line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 16px;
}
.event-choices {
    display: flex; flex-direction: column; gap: 8px;
}
.btn-choice {
    padding: 12px 16px; border: 1px solid var(--border-color);
    border-radius: var(--radius-sm); background: var(--bg-card);
    color: var(--text-primary); cursor: pointer;
    font-size: 13px; text-align: left;
    transition: all 0.2s; font-weight: 500;
}
.btn-choice:hover:not(:disabled) {
    border-color: var(--accent-gold);
    background: var(--bg-card-hover);
    transform: translateX(4px);
}
.btn-choice:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-gold { border-color: var(--accent-gold); }
.btn-red { border-color: var(--accent-red); }
.btn-purple { border-color: var(--accent-purple); }
.btn-gray { border-color: var(--border-color); }
.req-text { color: var(--accent-red); font-size: 11px; margin-left: 4px; }

/* ===== Shop ===== */
.shop-grid, .inventory-grid {
    display: flex; flex-direction: column; gap: 8px;
    padding: 12px;
}
.shop-item, .inv-item {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.2s;
}
.shop-item:hover, .inv-item:hover {
    border-color: var(--border-glow);
}
.shop-item-disabled { opacity: 0.5; }
.shop-item-icon, .inv-item-icon { font-size: 28px; flex-shrink: 0; }
.shop-item-info, .inv-item-info { flex: 1; min-width: 0; }
.shop-item-name, .inv-item-name { font-weight: 600; font-size: 13px; }
.shop-item-desc, .inv-item-desc { font-size: 11px; color: var(--text-muted); }
.shop-item-effect { font-size: 11px; color: var(--accent-green); margin-top: 2px; }
.shop-item-footer {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 4px;
    flex-shrink: 0;
}
.shop-item-price { font-weight: 700; font-size: 14px; color: var(--accent-gold); }
.shop-footer {
    padding: 10px 16px; border-top: 1px solid var(--border-color);
    display: flex; justify-content: space-between; align-items: center;
}
.inv-item-count { font-size: 11px; color: var(--text-muted); }

/* ===== Combat ===== */
.combat-modal .combat-body { padding: 16px; }
.combat-info { margin-bottom: 12px; font-size: 13px; }
.combat-strategies { display: flex; flex-direction: column; gap: 10px; }
.strategy-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 12px; transition: all 0.2s;
}
.strategy-card:hover { border-color: var(--border-glow); }
.strategy-disabled { opacity: 0.4; }
.strategy-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.strategy-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.strategy-special { font-size: 11px; color: var(--accent-gold); margin-bottom: 4px; }
.strategy-stats {
    display: flex; gap: 12px; font-size: 11px;
    color: var(--text-muted); margin-bottom: 8px;
}

/* ===== District Cards ===== */
.district-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}
.district-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 10px; cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
}
.district-card:hover { border-color: var(--border-glow); transform: translateY(-1px); }
.district-card.owned {
    border-color: var(--accent-purple);
    background: linear-gradient(135deg, var(--bg-card), rgba(139,92,246,0.05));
}
.district-card .district-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.district-card .district-income { font-size: 11px; color: var(--accent-green); }
.district-card .district-desc { font-size: 10px; color: var(--text-muted); }
.district-card .district-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; padding: 2px 6px;
    border-radius: 4px; background: var(--accent-purple);
    color: white;
}

/* ===== Equip ===== */
.equip-list {
    padding: 12px; display: flex; flex-direction: column; gap: 6px;
}
.equip-target {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 10px 14px; cursor: pointer;
    display: flex; justify-content: space-between;
    align-items: center; transition: all 0.2s;
    font-size: 13px;
}
.equip-target:hover {
    border-color: var(--accent-gold);
    background: var(--bg-card-hover);
}
.class-badge {
    padding: 2px 8px; border-radius: 4px;
    background: var(--accent-purple); color: white;
    font-size: 11px; font-weight: 600;
}

/* ===== Tables - for detailed crew/mission views ===== */
.data-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
}
.data-table th {
    text-align: left; padding: 8px 6px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-muted); font-weight: 600;
}
.data-table td {
    padding: 8px 6px; border-bottom: 1px solid rgba(42,42,64,0.5);
}
.data-table tr:hover td { background: rgba(139,92,246,0.03); }

/* ===== Toast ===== */
.toast-container {
    position: fixed; top: 100px; right: 16px;
    z-index: 2000; display: flex; flex-direction: column;
    gap: 6px; pointer-events: none;
}
.toast {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 12px;
    animation: slideIn 0.3s ease-out;
    max-width: 260px;
    box-shadow: var(--shadow);
    pointer-events: auto;
}
.toast-success { border-color: var(--accent-green); }
.toast-error { border-color: var(--accent-red); }
.toast-info { border-color: var(--accent-cyan); }
@keyframes slideIn {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* ===== Mission List ===== */
.mission-list { display: flex; flex-direction: column; gap: 8px; }
.mission-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 12px; transition: all 0.2s;
}
.mission-card:hover { border-color: var(--border-glow); }
.mission-card.locked { opacity: 0.4; }
.mission-name { font-weight: 700; font-size: 13px; }
.mission-desc { font-size: 11px; color: var(--text-secondary); margin: 2px 0 6px; }
.mission-stats {
    display: flex; gap: 10px; font-size: 10px;
    color: var(--text-muted); margin-bottom: 6px;
}
.mission-reward { color: var(--accent-gold); }

/* ===== Development & Misc ===== */
.stat-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 6px 0;
    font-size: 13px; border-bottom: 1px solid rgba(42,42,64,0.3);
}
.stat-label { color: var(--text-secondary); }
.stat-value { font-weight: 600; }
.progress-bar {
    height: 6px; background: var(--bg-card);
    border-radius: 3px; overflow: hidden; margin: 4px 0;
}
.progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.3s;
}
.phase-badge {
    display: inline-block;
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
}

/* Utility */
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.text-success { color: var(--accent-green); }
.text-danger { color: var(--accent-red); }
.text-warning { color: var(--accent-gold); }
.text-gold { color: var(--accent-gold); }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-8 { gap: 8px; }
.gap-4 { gap: 4px; }

/* ===== Ending Screen ===== */
.ending-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
    z-index: 3000; animation: fadeIn 1s;
    padding: 20px;
}
.ending-screen {
    text-align: center; max-width: 360px;
}
.ending-emoji { font-size: 80px; margin-bottom: 16px; }
.ending-title {
    font-size: 32px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
}
.ending-desc {
    font-size: 14px; color: var(--text-secondary);
    line-height: 1.8; margin-bottom: 24px;
}
.ending-stats {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 16px; margin-bottom: 24px;
}
.ending-stat { margin: 4px 0; font-size: 13px; }
.ending-stat .stat-label { color: var(--text-muted); }
.ending-stat .stat-value { color: var(--text-primary); }

/* ===== Responsive ===== */
@media (max-width: 360px) {
    .resource-bar { gap: 2px 6px; font-size: 10px; }
    .resource-item { padding: 2px 3px; }
    .district-grid { grid-template-columns: 1fr; }
    .start-title { font-size: 36px; }
}
@media (min-width: 600px) {
    .district-grid { grid-template-columns: repeat(3, 1fr); }
    .tab-content { padding: 16px 24px; }
    .resource-bar { justify-content: center; }
    .info-bar { justify-content: center; }
}

/* ===== Phase Colors ===== */
.phase-0 { background: linear-gradient(135deg, #6b7280, #4b5563); }
.phase-1 { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
.phase-2 { background: linear-gradient(135deg, #db2777, #be185d); }
.phase-3 { background: linear-gradient(135deg, #f59e0b, #d97706); }

.phase-text-0 { color: #9ca3af; }
.phase-text-1 { color: #a78bfa; }
.phase-text-2 { color: #f472b6; }
.phase-text-3 { color: #fbbf24; }

/* Phase gradient tab background */
.nav-btn[data-tab].active { color: var(--accent-purple); }

/* ===== Text Truncation ===== */
.text-ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

// ---- 存档系统 ----
const SAVE_KEY = 'darktide_save';

function saveGame(state) {
    try {
        const saveData = {
            version: 1,
            timestamp: Date.now(),
            day: state.day,
            phase: state.phase,
            level: state.level,
            state: state,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
        return true;
    } catch (e) {
        console.error('保存失败:', e);
        return false;
    }
}

function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        // 版本兼容检查
        if (!data.version || data.version < 1) return null;
        return data.state;
    } catch (e) {
        console.error('读取存档失败:', e);
        return null;
    }
}

function deleteSave() {
    localStorage.removeItem(SAVE_KEY);
}

function hasSave() {
    return localStorage.getItem(SAVE_KEY) !== null;
}

// ---- 资源变更 ----
function addMoney(state, amount) {
    state.money = Math.max(0, state.money + amount);
    return amount > 0;
}

function spendMoney(state, amount) {
    if (state.money < amount) return false;
    state.money -= amount;
    return true;
}

function addNotoriety(state, amount) {
    state.notoriety = Math.max(0, Math.min(100, state.notoriety + amount));
    checkEndings(state);
}

function addInfluence(state, amount) {
    state.influence = Math.max(0, Math.min(100, state.influence + amount));
    checkEndings(state);
}

function changeSecurity(state, amount) {
    state.security = Math.max(0, Math.min(100, state.security + amount));
    checkEndings(state);
}

function addIntel(state, amount) {
    state.intel = Math.max(0, state.intel + amount);
    // 检查情报等级
    for (const lvl of [...CONFIG.INTEL_LEVELS].reverse()) {
        if (state.intel >= lvl.minIntel && lvl.id > state.intelLevel) {
            state.intelLevel = lvl.id;
            addMessage(`情报等级提升: ${lvl.name} - ${lvl.desc}`, 'info');
            break;
        }
    }
}

function addExp(state, amount) {
    state.exp += amount;
    state.totalExpEarned += amount;
    while (state.exp >= expToNext(state) && state.level < CONFIG.MAX_LEVEL) {
        state.exp -= expToNext(state);
        state.level++;
        state.phase = getPhase(state);
        state.maxAp = CONFIG.BASE_AP + Math.floor(state.level / 5);
        addMessage(`等级提升! 当前等级: ${state.level} (${CONFIG.PHASES[state.phase].name})`, 'success');
        // 升级奖励
        if (state.level % 5 === 0) {
            addMessage('阶段突破! 解锁新任务和区域!', 'special');
        }
    }
}

function expToNext(state) {
    return Math.floor(50 * Math.pow(1.2, state.level - 1));
}

function getPhase(state) {
    for (const p of CONFIG.PHASES) {
        if (state.level >= p.levelMin && state.level <= p.levelMax) return p.id;
    }
    return 3;
}

function useAp(state, cost) {
    if (state.ap < cost) return false;
    state.ap -= cost;
    return true;
}

function recoverAp(state) {
    state.ap = Math.min(state.maxAp, state.ap + 1);
}

function canDoMission(state, mission) {
    if (mission.phase > state.phase) return false;
    if (state.ap < 1) return false;
    if (mission.combatReq > 0 && state.manpower < mission.combatReq) return false;
    return true;
}

// ---- 成员管理 ----
function getMemberById(state, id) {
    return state.crew.find(m => m.id === id);
}

function getAvailableCrew(state) {
    return state.crew.filter(m => m.status === 'idle');
}

function countCrewByClass(state, className) {
    return state.crew.filter(m => m.class === className && m.status !== 'dead').length;
}

// ---- 检查结局 ----
function checkEndings(state) {
    for (const ending of CONFIG.ENDINGS) {
        if (ending.id === 'death' && ending.check(state)) {
            triggerEnding(state, ending);
            return;
        }
    }
    // 正常结局检查
    if (state.day >= 60) {
        for (const ending of CONFIG.ENDINGS) {
            if (ending.id !== 'death' && ending.check(state)) {
                triggerEnding(state, ending);
                return;
            }
        }
        // 没有触发任何好结局，触发默认结局
        triggerEnding(state, { id: 'default', name: '黑道生涯', emoji: '🎲', desc: '你的故事在黑暗中落幕，无人知晓。' });
    }
}

function triggerEnding(state, ending) {
    state.isGameOver = true;
    state.ending = ending;
    state.triggeredEnding = true;
    addMessage(`★ 结局触发: ${ending.emoji} ${ending.name}`, 'ending');
    renderEndingScreen(state, ending);
}

// ---- 道具管理 ----
function addItemToInventory(state, itemId) {
    const itemDef = CONFIG.ITEMS.find(i => i.id === itemId);
    if (!itemDef) return false;
    const existing = state.inventory.find(i => i.id === itemId);
    if (existing) {
        existing.count = (existing.count || 1) + 1;
    } else {
        state.inventory.push({ id: itemId, count: 1 });
    }
    return true;
}

function useItem(state, itemId, targetMemberId) {
    const itemDef = CONFIG.ITEMS.find(i => i.id === itemId);
    if (!itemDef) return false;
    const inv = state.inventory.find(i => i.id === itemId);
    if (!inv || inv.count < 1) return false;

    // 应用效果
    switch (itemDef.effect.type) {
        case 'combat':
            // 装备到成员
            if (targetMemberId) {
                const member = getMemberById(state, targetMemberId);
                if (member) {
                    member.items = member.items || [];
                    member.items.push(itemId);
                    inv.count--;
                    if (inv.count <= 0) {
                        state.inventory = state.inventory.filter(i => i.id !== itemId);
                    }
                    addMessage(`已为 ${member.name} 装备 ${itemDef.emoji}${itemDef.name}`, 'info');
                    return true;
                }
            }
            return false;
        case 'recruit':
            // 全局buff，使用就消耗
            state._recruitBoost = (state._recruitBoost || 0) + itemDef.effect.value;
            inv.count--;
            break;
        case 'security':
            changeSecurity(state, itemDef.effect.value);
            inv.count--;
            break;
        case 'intel':
            state._intelBoost = (state._intelBoost || 0) + itemDef.effect.value;
            inv.count--;
            break;
        case 'influence_once':
            addInfluence(state, itemDef.effect.value);
            inv.count--;
            break;
        case 'notoriety_once':
            addNotoriety(state, itemDef.effect.value);
            inv.count--;
            break;
        case 'save_member':
            // 被动效果，使用后标记
            state._medkitActive = (state._medkitActive || 0) + 1;
            inv.count--;
            break;
    }
    if (inv.count <= 0) {
        state.inventory = state.inventory.filter(i => i.id !== itemId);
    }
    addMessage(`使用了 ${itemDef.emoji}${itemDef.name}`, 'info');
    return true;
}

// ===== 成员系统 v3 =====

function createNewMember(state, options) {
    options = options || {};
    
    // 根据帮派规模决定初始等级
    let baseLv = 1;
    if (state.phase >= 3) baseLv = 5 + Math.floor(Math.random() * 4);
    else if (state.phase >= 2) baseLv = 3 + Math.floor(Math.random() * 3);
    else if (state.phase >= 1) baseLv = 2 + Math.floor(Math.random() * 2);
    if (options.lv) baseLv = options.lv;
    
    const jobs = CONFIG.JOBS || JOBS;
    const names = CONFIG.MEMBER_NAMES || MEMBER_NAMES;
    const job = options.job || jobs[Math.floor(Math.random() * jobs.length)];
    const name = options.name || names[Math.floor(Math.random() * names.length)];
    
    const stat = (job.bs || 3) + Math.floor(baseLv / 3) + (Math.random() > 0.5 ? 1 : -1);
    
    const member = {
        id: Date.now() + Math.floor(Math.random() * 9999),
        name: name,
        class: job.k,
        className: job.n,
        emoji: job.e,
        lv: baseLv,
        xp: 0,
        xpNeeded: baseLv * 20,
        stat: Math.max(1, stat),
        loyalty: options.loyalty || 50 + Math.floor(Math.random() * 30),
        ap: 3 + Math.floor(baseLv / 3),
        maxAp: 3 + Math.floor(baseLv / 3),
        hp: 80 + Math.floor(Math.random() * 20),
        maxHp: 100,
        status: 'idle',
        missions: 0,
        kills: 0,
        equipped: [],
        joinedAt: state.turn || 1,
        
        // === 隐藏的性格与关系属性 ===
        _personality: P(['暴躁','阴冷','忠诚','狡诈','热血','冷静','狂妄','谨慎']),
        _rivalries: [],    // 看不对眼的人 [id, id, ...]
        _bonds: [],        // 关系铁的兄弟 [id, id, ...]
        
        // === 隐藏的卧底属性（不渲染到UI中）===
        _isMole: false,
        _moleFaction: null,     // 'police' 或 敌对帮派名
        _moleActive: true,       // 卧底是否还在活动中
        _sabotages: 0,          // 已破坏次数
        _killCount: 0,          // 已杀害同事数
    };
    
    // 根据条件决定是否成为卧底（不暴露给玩家）
    if (state.turn > 3 && state.phase < 4) {
        const moleChance = calculateMoleChance(state);
        if (Math.random() < moleChance) {
            member._isMole = true;
            // 决定是谁派来的
            const enemies = (state.enemies || []).filter(e => e.alive);
            if (enemies.length > 0 && Math.random() < 0.6) {
                member._moleFaction = enemies[Math.floor(Math.random() * enemies.length)].name;
            } else {
                member._moleFaction = 'police';
            }
            // 卧底初始忠诚可能偏高（伪装）
            member.loyalty = 65 + Math.floor(Math.random() * 20);
        }
    }
    
    if (options.isMole !== undefined) member._isMole = options.isMole;
    if (options.moleFaction) member._moleFaction = options.moleFaction;
    
    return member;
}

// 初始化新成员与其他成员的关系
function initMemberRelations(state, newMember) {
    if (!state.crew || state.crew.length === 0) return;
    state.crew.forEach(existing => {
        if (existing.status === 'dead') return;
        // 性格相克产生敌意
        const conflicts = {
            '暴躁': ['狂妄','狡诈'],
            '阴冷': ['热血','狂妄'],
            '忠诚': ['狡诈','阴冷'],
            '狡诈': ['忠诚','热血'],
            '热血': ['阴冷','冷静'],
            '冷静': ['热血','狂妄'],
            '狂妄': ['冷静','暴躁'],
            '谨慎': ['狂妄','暴躁'],
        };
        const np = newMember._personality;
        const ep = existing._personality;
        if (conflicts[np] && conflicts[np].includes(ep)) {
            if (Math.random() < 0.4) {
                newMember._rivalries.push(existing.id);
                existing._rivalries = existing._rivalries || [];
                if (!existing._rivalries.includes(newMember.id)) {
                    existing._rivalries.push(newMember.id);
                }
            }
        }
        // 相同性格或互补产生默契
        if (np === ep || (conflicts[ep] && !conflicts[ep].includes(np))) {
            if (Math.random() < 0.3) {
                newMember._bonds.push(existing.id);
                existing._bonds = existing._bonds || [];
                if (!existing._bonds.includes(newMember.id)) {
                    existing._bonds.push(newMember.id);
                }
            }
        }
    });
}

// 计算一组成员的团队默契（隐藏值）
function calculateTeamSynergy(state, memberIds) {
    const members = memberIds.map(id => state.crew.find(m => m.id === id)).filter(m => m);
    if (members.length <= 1) return 0;
    
    let synergy = 0;
    
    for (let i = 0; i < members.length; i++) {
        for (let j = i + 1; j < members.length; j++) {
            const a = members[i];
            const b = members[j];
            
            // 有仇
            if (a._rivalries && a._rivalries.includes(b.id)) {
                synergy -= 8;
            }
            // 有默契
            if (a._bonds && a._bonds.includes(b.id)) {
                synergy += 6;
            }
            // 相同职业竞争
            if (a.class === b.class) {
                synergy -= 2;
            }
            // 医师让团队更稳定
            if (a.class === '医师' || b.class === '医师') {
                synergy += 2;
            }
        }
    }
    
    // 有卧底会拖累团队
    if (members.some(m => m._isMole && m._moleActive)) {
        synergy -= 10;
    }
    
    return synergy;
}

// 计算卧底概率
function calculateMoleChance(state) {
    let chance = 0.03;  // 基础3%
    if (state.notoriety > 60) chance += 0.05;  // 恶名高了警察盯得紧
    if (state.notoriety > 100) chance += 0.07;
    if (state.phase >= 2) chance += 0.03;      // 势力大了容易被渗透
    if (state.security < 30) chance += 0.05;    // 安全度低容易混入
    return Math.min(chance, 0.2);               // 最高20%
}

// 招募普通成员
function recruitMember(state) {
    if (state.money < 500) { showToast('需要$500', 'error'); return; }
    if (state.crew.length >= state.maxCrew) { showToast('人手已满', 'error'); return; }
    state.money -= 500;
    const m = createNewMember(state);
    initMemberRelations(state, m);
    state.crew.push(m);
    state.manpower = state.crew.length;
    showToast(m.emoji + m.name + ' (' + m.className + ') Lv.' + m.lv + ' 加入', 'success');
    addMessage('招募: ' + m.emoji + m.name + ' Lv.' + m.lv + ' ' + m.className, 'info');
    updateUI();
}

// 从敌对帮派挖角
function poachMember(state) {
    const enemies = (state.enemies || []).filter(e => e.alive);
    if (enemies.length === 0) { showToast('没有敌对帮派可挖角', 'error'); return; }
    if (state.money < 1500) { showToast('需要$1500', 'error'); return; }
    
    // 选择一个敌对势力
    const target = enemies[Math.floor(Math.random() * enemies.length)];
    const cost = 1500 + Math.floor(target.power * 20);
    if (state.money < cost) { showToast('需要$' + cost, 'error'); return; }
    
    const chance = 0.3 + state.influence * 0.003 - target.power * 0.005;
    state.money -= cost;
    
    if (Math.random() < Math.max(0.1, Math.min(0.8, chance))) {
        const m = createNewMember(state, { lv: 3 + Math.floor(Math.random() * 4) });
        m.loyalty = 30 + Math.floor(Math.random() * 15);  // 挖来的忠诚度低
        m._origFaction = target.name;
        state.crew.push(m);
        state.manpower = state.crew.length;
        // 可能挖到卧底（对方反向渗透）
        if (Math.random() < 0.15) {
            m._isMole = true;
            m._moleFaction = target.name;
        }
        showToast('成功从' + target.name + '挖来' + m.emoji + m.name + ' Lv.' + m.lv, 'success');
        addMessage('挖角成功: ' + m.emoji + m.name + ' 从' + target.name + '加入', 'info');
        // 关系恶化
        target.power = Math.min(target.maxPower || 100, target.power + 3);
    } else {
        showToast('挖角失败，派去的人被杀了', 'error');
        addMessage('挖角' + target.name + '失败，损失$' + cost, 'error');
        if (state.crew.length > 0 && Math.random() < 0.3) {
            const victim = state.crew[Math.floor(Math.random() * state.crew.length)];
            victim.status = 'dead';
            state.crew = state.crew.filter(m => m.status !== 'dead');
            state.manpower = state.crew.length;
            showToast('派去的联络人' + victim.name + '遇害', 'error');
        }
    }
    updateUI();
}

// 逐出成员
function expelMember(state, memberId) {
    const m = state.crew.find(c => c.id === memberId);
    if (!m) return;
    state.crew = state.crew.filter(c => c.id !== memberId);
    state.manpower = state.crew.length;
    // 逐出卧底不涨恶名
    if (!m._isMole) {
        state.notoriety = Math.max(0, state.notoriety - 2);
        addMessage('逐出了 ' + m.emoji + m.name, 'info');
    } else {
        addMessage('卧底 ' + m.emoji + m.name + ' 被逐出组织', 'success');
    }
    showToast(m.name + ' 已逐出', 'info');
    updateUI();
}

// 击杀成员（处决）
function executeMember(state, memberId) {
    const m = state.crew.find(c => c.id === memberId);
    if (!m) return;
    state.crew = state.crew.filter(c => c.id !== memberId);
    state.manpower = state.crew.length;
    state.notoriety += 5;
    state.security = Math.max(0, state.security - 5);
    
    // 如果是卧底，与派来方关系恶化
    if (m._isMole && m._moleFaction) {
        const enemy = (state.enemies || []).find(e => e.name === m._moleFaction);
        if (enemy && enemy.alive) {
            enemy.power = Math.min(enemy.maxPower || 100, enemy.power + 8);
            addMessage(m._moleFaction + '因你处决了他们的卧底而震怒，战力+8', 'error');
        }
        if (m._moleFaction === 'police') {
            state.security = Math.max(0, state.security - 15);
            showToast('杀害警方卧底！警方加大了对你的打击力度', 'error');
        }
        addMessage('处决了卧底 ' + m.emoji + m.name + ' (' + m._moleFaction + ')', 'info');
    } else {
        showToast('处决了 ' + m.emoji + m.name + '，恶名+5', 'info');
        addMessage('处决: ' + m.emoji + m.name, 'info');
    }
    updateUI();
}

// 成功策反卧底
function turnMole(state, memberId) {
    const m = state.crew.find(c => c.id === memberId);
    if (!m || !m._isMole) return;
    m._isMole = false;      // 不再是卧底
    m.loyalty = 35;         // 忠诚度低，但可以培养
    m._moleFaction = null;
    m.lv += 2;              // 双面间谍经验丰富
    addMessage('成功策反卧底 ' + m.emoji + m.name + '！现在是双面间谍了', 'success');
    showToast('策反成功！' + m.name + '已成为你的人', 'success');
    updateUI();
}

// 提升成员经验
function addMemberXp(state, member, amount) {
    if (!member || member.status === 'dead') return;
    member.xp += amount;
    while (member.xp >= member.xpNeeded) {
        member.xp -= member.xpNeeded;
        member.lv++;
        member.xpNeeded = member.lv * 20;
        member.stat++;
        member.maxAp = 3 + Math.floor(member.lv / 3);
        showToast(member.emoji + member.name + ' 升级! Lv.' + member.lv, 'success');
        addMessage(member.name + ' 升到Lv.' + member.lv + '，战力+' + member.stat, 'info');
    }
}

    html += '<div>生命: ❤️' + m.hp + '/' + m.maxHp + '</div>';

}

// 卧底行动检查（在每次任务后调用，不暴露具体逻辑）
function checkMoleActivity(state, missionMembers, missionSuccess) {
    const moles = missionMembers.filter(m => m._isMole && m._moleActive && m.status !== 'dead');
    if (moles.length === 0) return null;
    
    let result = null;
    
    for (const mole of moles) {
        // 卧底行为：任务失败时落井下石
        if (!missionSuccess && Math.random() < 0.4) {
            // 害死一个同事
            const targets = missionMembers.filter(m => !m._isMole && m.status !== 'dead');
            if (targets.length > 0) {
                const victim = targets[Math.floor(Math.random() * targets.length)];
                victim.status = 'dead';
                mole._killCount++;
                result = {
                    type: 'betray',
                    moleName: mole.name,
                    victimName: victim.name,
                    moleEmoji: mole.emoji,
                };
                addMessage('[卧底] ' + mole.emoji + mole.name + ' 在混乱中杀害了 ' + victim.name, 'error');
            }
        }
        
        // 任务成功时也有小概率搞破坏
        if (missionSuccess && Math.random() < 0.1) {
            mole._sabotages++;
            result = {
                type: 'sabotage',
                moleName: mole.name,
                moleEmoji: mole.emoji,
            };
            // 收益减少
            const penalty = 100 + Math.floor(Math.random() * 200);
            state.money = Math.max(0, state.money - penalty);
            addMessage('[卧底] ' + mole.emoji + mole.name + ' 私吞了部分收益 (-$' + penalty + ')', 'error');
        }
        
        // 已杀够多人可能试图刺杀老大
        if (mole._killCount >= 2 && Math.random() < 0.05) {
            result = {
                type: 'assassinate',
                moleName: mole.name,
                moleEmoji: mole.emoji,
            };
            // 触发刺杀事件（由事件系统处理）
            addMessage('⚠ 一条暗杀你的计划正在酝酿...', 'error');
        }
    }
    
    return result;
}

// 派成员出任务（自动分配）
function assignMissionCrew(state, missionId, count) {
    const available = state.crew.filter(m => m.status === 'idle' && m.ap >= 1);
    const selected = [];
    
    // 按战力排序，优先派高级的
    available.sort((a, b) => (b.lv + (b.stat||0)) - (a.lv + (a.stat||0)));
    
    for (let i = 0; i < Math.min(count, available.length); i++) {
        selected.push(available[i]);
        available[i].status = 'working';
        available[i].ap = Math.max(0, available[i].ap - 1);
    }
    
    return selected;
}

// 完成任务后恢复成员
function completeMissionCrew(state, memberIds, success) {
    memberIds.forEach(id => {
        const m = state.crew.find(c => c.id === id);
        if (!m) return;
        m.status = 'idle';
        m.missions = (m.missions || 0) + 1;
        if (success) {
            m.loyalty = Math.min(100, (m.loyalty || 50) + 2);
            addMemberXp(state, m, 10 + Math.floor(Math.random() * 10));
        } else {
            m.loyalty = Math.max(5, (m.loyalty || 50) - 5);
            addMemberXp(state, m, 3 + Math.floor(Math.random() * 5));
        }
    });
}

// 任务选人界面
function openMissionSetup(missionId) {
    const mission = CONFIG.MISSIONS.find(m => m.id === missionId);
    if (!mission) return;
    
    const available = state.crew.filter(m => m.status === 'idle' && m.ap >= 1);
    if (available.length < mission.minCrew) {
        showToast('需要至少' + mission.minCrew + '名空闲成员！当前仅' + available.length + '人', 'error');
        return;
    }
    
    state._pendingMission = missionId;
    state._selectedMissionCrew = [];
    
    let html = '<div class="modal-overlay show" id="missionModal"><div class="modal-content">';
    html += '<div class="modal-header"><span>⚡ ' + mission.id + '</span>';
    html += '<button class="btn-close" onclick="closeModal(\'missionModal\')">✕</button></div>';
    html += '<div style="font-size:.65em;color:#888;margin:4px 0">' + mission.desc + ' | 奖励: $' + calculateMissionReward(state, mission) + '</div>';
    
    // 成员选择
    html += '<div style="margin:6px 0;font-size:.7em;color:#fbbf24">选择参战成员（至少' + mission.minCrew + '人，点选切换）</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0;max-height:200px;overflow-y:auto;padding:2px">';
    
    available.forEach(m => {
        const isMatch = (m.class === '打手' && mission.combatReq > 0) || (m.class === '情报员' && mission.intelReq > 0) || m.class === '杀手' || m.class === '狙击手';
        html += '<div class="crew-chip" data-mid="' + m.id + '" onclick="toggleMissionMember(' + m.id + ')" style="border:1px solid #444;border-radius:20px;padding:4px 10px;font-size:.65em;cursor:pointer;background:transparent">';
        html += m.emoji + ' ' + m.name + ' Lv.' + m.lv;
        if (isMatch) html += ' <span style="color:#34d399">✓</span>';
        html += ' <span style="color:#888">⏱' + m.ap + '</span>';
        html += '</div>';
    });
    
    html += '</div>';
    
    // 已选人数
    html += '<div style="font-size:.65em;color:#888;margin:4px 0" id="missionCrewCount">已选: 0/' + available.length + '人 | 团队默契: <span id="synergyDisplay">计算中...</span></div>';
    
    html += '<div class="btn-group" style="margin-top:6px">';
    html += '<button class="btn btn-gold" onclick="executeMissionWithCrew()" id="missionGoBtn" disabled>⚡ 执行任务</button>';
    html += '<button class="btn" onclick="closeModal(\'missionModal\')">取消</button>';
    html += '</div></div></div>';
    
    document.body.insertAdjacentHTML('beforeend', html);
}

function toggleMissionMember(memberId) {
    const idx = state._selectedMissionCrew.indexOf(memberId);
    if (idx >= 0) {
        state._selectedMissionCrew.splice(idx, 1);
    } else {
        state._selectedMissionCrew.push(memberId);
    }
    updateMissionUI();
}

function updateMissionUI() {
    const count = state._selectedMissionCrew.length;
    const mission = CONFIG.MISSIONS.find(m => m.id === state._pendingMission);
    if (!mission) return;
    
    // 更新计数
    const el = document.getElementById('missionCrewCount');
    if (el) {
        const synergy = calculateTeamSynergy(state, state._selectedMissionCrew);
        const synColor = synergy > 5 ? '#34d399' : synergy < -5 ? '#f87171' : '#888';
        el.innerHTML = '已选: ' + count + '/' + (state.crew.filter(m => m.status === 'idle' && m.ap >= 1).length) + '人 | 团队默契: <span style="color:' + synColor + '">' + (synergy > 0 ? '+' : '') + synergy + '%</span>';
    }
    
    // 更新高亮
    document.querySelectorAll('.crew-chip').forEach(chip => {
        const id = parseInt(chip.dataset.mid);
        const selected = state._selectedMissionCrew.includes(id);
        chip.style.borderColor = selected ? '#34d399' : '#444';
        chip.style.background = selected ? 'rgba(52,211,153,0.15)' : 'transparent';
    });
    
    // 启用/禁用按钮
    const btn = document.getElementById('missionGoBtn');
    if (btn) btn.disabled = count < mission.minCrew;
}

// 新版的执行任务（带选人）
function executeMissionWithCrew() {
    const missionId = state._pendingMission;
    const mission = CONFIG.MISSIONS.find(m => m.id === missionId);
    if (!mission) return;
    
    const memberIds = state._selectedMissionCrew;
    if (!memberIds || memberIds.length < mission.minCrew) {
        showToast('至少需要' + mission.minCrew + '人', 'error');
        return;
    }
    
    if (state.ap < 1) { showToast('行动力不足', 'error'); return; }
    
    closeModal('missionModal');
    state.ap -= 1;
    
    const reward = calculateMissionReward(state, mission);
    const synergy = calculateTeamSynergy(state, memberIds);
    
    // 计算成功率
    let successRate = 0.45;
    successRate += state.level * 0.012;
    successRate += state.influence * 0.002;
    
    // 职业匹配
    memberIds.forEach(id => {
        const m = state.crew.find(c => c.id === id);
        if (!m) return;
        if (m.class === '打手' && mission.combatReq > 0) successRate += 0.05;
        if (m.class === '情报员' && mission.intelReq > 0) successRate += 0.05;
        if (m.class === '杀手') successRate += 0.03;
        if (m.class === '狙击手') successRate += 0.03;
    });
    
    // 团队默契影响
    successRate += synergy * 0.005;  // 默契每点±0.5%
    
    // 人数奖励（人越多配合越难，但力量越大）
    successRate += memberIds.length * 0.02;
    
    successRate = Math.max(0.1, Math.min(0.95, successRate));
    
    const isSuccess = Math.random() < successRate;
    
    // 派成员出任务
    const assigned = memberIds.map(id => state.crew.find(c => c.id === id)).filter(m => m);
    assigned.forEach(m => {
        m.status = 'working';
        m.ap = Math.max(0, (m.ap || 3) - 1);
    });
    
    // 检查卧底活动
    const moleResult = checkMoleActivity(state, assigned, isSuccess);
    
    if (isSuccess) {
        state.money += reward;
        addExp(state, 10 + Math.floor(Math.random() * 15));
        addNotoriety(state, mission.baseRisk / 10);
        addInfluence(state, 1);
        state.missionHistory.push({ id: mission.id, success: true, day: state.turn });
        completeMissionCrew(state, memberIds, true);
        
        let msg = '任务成功! +$' + reward;
        if (synergy > 5) msg += ' (默契配合+' + synergy + '%)';
        else if (synergy < -5) msg += ' (成员不合-' + Math.abs(synergy) + '%)';
        addMessage('[任务] ' + missionId + ' 成功! $' + reward, 'success');
        showToast(msg, 'success');
        
        // 道具掉落
        checkMissionDrop();
        
        if (Math.random() < 0.15) setTimeout(() => triggerRandomEvent(state), 500);
    } else {
        const penalty = Math.floor(reward * 0.3);
        state.money = Math.max(0, state.money - penalty);
        addNotoriety(state, mission.baseRisk / 5);
        state.missionHistory.push({ id: mission.id, success: false, day: state.turn });
        completeMissionCrew(state, memberIds, false);
        
        let msg = '任务失败! -$' + penalty;
        if (synergy < -10) msg += ' (成员严重不合)';
        addMessage('[任务] ' + missionId + ' 失败! -$' + penalty, 'error');
        showToast(msg, 'error');
        
        // 战损 - 成员不合会加大损失
        const lossChance = 0.15 + (synergy < 0 ? Math.abs(synergy) * 0.01 : 0);
        assigned.forEach(m => {
            if (Math.random() < lossChance) {
                m.hp = (m.hp || 80) - 30;
                if ((m.hp || 50) <= 0 && Math.random() < 0.5) {
                    m.status = 'dead';
                    addMessage(m.name + ' 在任务中阵亡', 'error');
                    showToast(m.name + ' 阵亡...', 'error');
                }
            }
        });
        state.crew = state.crew.filter(m => m.status !== 'dead');
        state.manpower = state.crew.length;
    }
    
    checkEndings(state);
    renderActionsTab();
    updateUI();
}

// 回收AP
function resetAp(state) {
    state.crew.filter(m => m.status !== 'dead').forEach(m => {
        m.ap = m.maxAp || (3 + Math.floor(m.lv / 3));
    });
}

    const eventHtml = `

                </div>
                <div class="event-body">
                    <div class="event-desc">
                        <p>${member.name}（${member.class}）的忠诚度降到了 <span class="danger-text">${member.loyalty}</span>！</p>
                        <p>他对你的统治感到不满，正在考虑叛变或离开。</p>
                    </div>
                    <div class="event-info">
                        <span class="stat-badge">忠诚度: ${member.loyalty}/100</span>
                        <span class="stat-badge">等级: ${member.level}</span>
                        <span class="stat-badge">任务: ${member.missionsDone}次</span>
                    </div>
                    <div class="event-choices">
                        <button class="btn-choice btn-gold" onclick="handleLoyaltyChoice('bribe', ${member.id})">
                            💰 给好处安抚 ($200)
                        </button>
                        <button class="btn-choice btn-red" onclick="handleLoyaltyChoice('execute', ${member.id})">
                            🗡️ 杀鸡儆猴
                        </button>
                        <button class="btn-choice btn-purple" onclick="handleLoyaltyChoice('talk', ${member.id})">
                            🤝 谈话感化
                        </button>
                        <button class="btn-choice btn-gray" onclick="handleLoyaltyChoice('ignore', ${member.id})">
                            👀 静观其变
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', eventHtml);
}

function handleLoyaltyChoice(action, memberId) {
    const modal = document.getElementById('loyaltyEventModal');
    const member = getMemberById(G, memberId);
    if (!member) {
        if (modal) modal.remove();
        return;
    }

    switch (action) {
        case 'bribe':
            if (spendMoney(G, 200)) {
                member.loyalty = Math.min(100, member.loyalty + 25);
                addMessage(`💰 ${member.name} 收了好处，暂时安分了`, 'info');
                showToast(`${member.name} 忠诚度提升`, 'success');
            } else {
                showToast('资金不足!', 'error');
                member.loyalty = Math.max(0, member.loyalty - 10);
                addMessage(`${member.name} 因为得不到好处更加不满`, 'error');
            }
            break;
        case 'execute':
            member.status = 'dead';
            G.crew = G.crew.filter(m => m.id !== memberId);
            addNotoriety(G, 10);
            // 其他人的忠诚度提升（恐惧）
            for (const m of G.crew) {
                m.loyalty = Math.min(100, m.loyalty + 5);
            }
            addMessage(`💀 ${member.name} 被处决，其他人噤若寒蝉`, 'warning');
            showToast(`${member.name} 已被处决`, 'error');
            break;
        case 'talk':
            if (G.influence >= 20) {
                member.loyalty = Math.min(100, member.loyalty + 20);
                addMessage(`🤝 你和 ${member.name} 谈了心，他决定再信你一次`, 'info');
                showToast('谈话感化成功', 'success');
            } else {
                member.loyalty = Math.max(0, member.loyalty - 15);
                addMessage(`${member.name} 觉得你在画大饼，更加失望了`, 'error');
                showToast('你的影响力不足以说服他', 'error');
            }
            break;
        case 'ignore':
            if (Math.random() < 0.4) {
                member.status = 'dead';
                G.crew = G.crew.filter(m => m.id !== memberId);
                addMessage(`🏃 ${member.name} 叛逃了！还带走了一批人手`, 'error');
                G.manpower = Math.max(0, G.manpower - 1);
                showToast(`${member.name} 叛逃了!`, 'error');
            } else {
                member.loyalty = Math.min(100, member.loyalty + 5);
                addMessage(`${member.name} 自己冷静了下来`, 'info');
            }
            break;
    }
    if (modal) modal.remove();
    renderCrewTab();
    updateUI();
}

// ---- 触发随机事件 ----
function triggerRandomEvent(state) {
    const available = [];
    for (const key of Object.keys(EVENTS)) {
        const evt = EVENTS[key];
        if (state.triggeredEvents.includes(evt.id)) continue;
        if (evt.phase > state.phase) continue;
        // 阶段性事件冷却
        available.push(evt);
    }
    // 如果没有可用事件，放宽限制
    if (available.length === 0) {
        for (const key of Object.keys(EVENTS)) {
            const evt = EVENTS[key];
            if (evt.phase > state.phase) continue;
            available.push(evt);
        }
    }
    if (available.length === 0) return;
    const event = available[Math.floor(Math.random() * available.length)];
    showEventModal(state, event);
}

// ---- 显示事件弹窗 ----
function showEventModal(state, event) {
    let choicesHtml = '';
    let validChoices = 0;

    for (let i = 0; i < event.choices.length; i++) {
        const choice = event.choices[i];
        let canChoose = true;
        let reqText = '';

        if (choice.req) {
            const reqs = [];
            if (choice.req.money && state.money < choice.req.money) reqs.push('资金不足');
            if (choice.req.manpower && state.manpower < choice.req.manpower) reqs.push('人手不足');
            if (choice.req.intel && state.intel < choice.req.intel) reqs.push('情报不足');
            if (choice.req.influence && state.influence < choice.req.influence) reqs.push('影响力不足');
            if (reqs.length > 0) {
                canChoose = false;
                reqText = `<span class="req-text">(需要：${reqs.join(', ')})</span>`;
            }
        }
        if (choice.cost.money && state.money < choice.cost.money) {
            canChoose = false;
            reqText = `<span class="req-text">(资金不足)</span>`;
        }
        if (choice.cost.intel && state.intel < choice.cost.intel) {
            canChoose = false;
            reqText = `<span class="req-text">(情报不足)</span>`;
        }

        choicesHtml += `
            <button class="btn-choice btn-${canChoose ? 'gold' : 'gray'}" 
                    onclick="${canChoose ? `handleEventChoice(${i})` : ''}"
                    ${canChoose ? '' : 'disabled'}>
                ${choice.text} ${reqText}
            </button>
        `;
        if (canChoose) validChoices++;
    }

    const modalHtml = `
        <div class="event-modal-overlay" id="eventModal">
            <div class="event-modal">
                <div class="event-header" style="background: linear-gradient(135deg, #6c3483, #2e86c1);">

    const event = _currentEvent;
    if (!event) return;

    const choice = event.choices[index];
    const success = Math.random() < choice.chance;

    // 消耗资源
    if (choice.cost.money) {
        const cost = Math.abs(choice.cost.money);
        spendMoney(G, cost);
    }
    if (choice.cost.intel) {
        const cost = Math.abs(choice.cost.intel);
        G.intel = Math.max(0, G.intel - cost);
    }
    if (choice.cost.manpower) {
        const loss = Math.abs(choice.cost.manpower);
        // 从现有成员中随机减少
        for (let i = 0; i < loss; i++) {
            const alive = state.crew.filter(m => m.status !== 'dead');
            if (alive.length === 0) break;
            const victim = alive[Math.floor(Math.random() * alive.length)];
            victim.status = 'dead';
        }
        state.crew = state.crew.filter(m => m.status !== 'dead');
        state.manpower = state.crew.length;
    }
    if (choice.cost.notoriety) {
        addNotoriety(G, choice.cost.notoriety);
    }

    let resultText = choice.result;
    const effects = { ...choice.effects };

    if (!success) {
                resultText += '\n\nâ ä½æ¯äºæå¹¶æ²¡ææè®¡ååå±...';
// 失败惩罚
        if (effects.money) effects.money = -Math.abs(effects.money);
        if (effects.manpower) effects.manpower = -Math.abs(effects.manpower);
        if (effects.notoriety) effects.notoriety = Math.abs(effects.notoriety);
        if (effects.security) effects.security = -Math.abs(effects.security);
        if (effects.influence) effects.influence = -Math.abs(effects.influence);
        if (effects.intel) effects.intel = -Math.abs(effects.intel);
    }

    // 应用效果
    if (effects.money) G.money = Math.max(0, G.money + effects.money);

    if (effects.notoriety) addNotoriety(G, effects.notoriety);
    if (effects.security) changeSecurity(G, effects.security);
    if (effects.influence) addInfluence(G, effects.influence);
    if (effects.intel) addIntel(G, effects.intel);
    if (effects.district_gain) {

        if (gained > 0) resultText += `

🏴 获得了 ${gained} 个新地盘！`;
    }

        if (special) {

🌟 ${special.name}（${special.class}）加入了你的组织！`;
        }

    if (effects.loyalty) {
        for (const m of G.crew) {
            m.loyalty = Math.min(100, Math.max(0, m.loyalty + effects.loyalty));
        }
    }

    // 处理特殊效果

    if (!G.triggeredEvents.includes(event.id)) {

    addMessage(`📜 [事件] ${event.title} - ${resultText.split('

function createSpecialMember(state) {
    const member = createNewMember(state);
    member.level = Math.min(10, state.level + 3);
    member.combat += 10;
    member.intel += 10;
    member.loyalty = 80;
    return member;
}

function gainRandomDistrict(state, count) {
    let gained = 0;
    const unlocked = CONFIG.DISTRICTS.filter(d => {
        if (state.districts[d.id]) return false;
        const idx = CONFIG.DISTRICTS.indexOf(d);
        if (idx > state.phase * 2 + 1) return false;
        return true;
    });
    for (let i = 0; i < count && i < unlocked.length; i++) {
        const target = unlocked[Math.floor(Math.random() * unlocked.length)];
        if (!state.districts[target.id]) {
            state.districts[target.id] = {
                id: target.id,
                control: 100,
                income: target.baseIncome,
                security: target.baseSecurity,
                gangId: null,
            };
            state.districtCount++;
            gained++;
            addMessage(`🏴 获得了新地盘: ${target.id}`, 'success');
        }
    }
    return gained;
}

// ==== 事件特殊效果处理 ====
function handleEventSpecial(state, special) {
    switch (special) {
        case 'reveal_mole': {
            // 揪出一个隐藏的卧底
            const moles = state.crew.filter(m => m._isMole && m.status !== 'dead');
            if (moles.length > 0) {
                const mole = moles[Math.floor(Math.random() * moles.length)];
                showMoleReveal(mole);
                addMessage('卧底曝光: ' + mole.emoji + mole.name + ' (' + mole._moleFaction + ')', 'error');
            }
            break;
        }
        case 'recruit_lone_wolf_high': {
            const m = createNewMember(state, { lv: 3 + Math.floor(Math.random() * 3), loyalty: 75 });
            m.stat = (m.stat || 5) + 3;
            state.crew.push(m);
            state.manpower = state.crew.length;
            addMessage('独行侠 ' + m.emoji + m.name + ' (' + m.className + ') Lv.' + m.lv + ' 加入', 'success');
            showToast(m.emoji + m.name + ' 加入了你的组织！', 'success');
            break;
        }
        case 'recruit_fighter': {
            const m = createNewMember(state, { lv: 4 + Math.floor(Math.random() * 3), loyalty: 65 });
            m.class = 'thug';
            m.className = '打手';
            m.emoji = '💪';
            m.stat = (m.stat || 5) + 5;
            state.crew.push(m);
            state.manpower = state.crew.length;
            addMessage('街斗高手 ' + m.emoji + m.name + ' Lv.' + m.lv + ' 加入', 'success');
            showToast('💪 ' + m.name + ' 加入！战力惊人', 'success');
            break;
        }
        case 'poach_enemy_member': {
            const m = createNewMember(state, { lv: 5 + Math.floor(Math.random() * 3), loyalty: 30 });
            state.crew.push(m);
            state.manpower = state.crew.length;
            // 可能是敌对反向安插的卧底
            if (Math.random() < 0.2) {
                m._isMole = true;
                m._moleFaction = '被挖角的帮派';
            }
            addMessage('挖来 ' + m.emoji + m.name + ' Lv.' + m.lv + ' (忠诚' + m.loyalty + ')', 'info');
            showToast('挖角成功！' + m.emoji + m.name, 'success');
            break;
        }
        case 'set_mole': {
            state._hasMole = true;
            state._moleIntel = (state._moleIntel || 0) + 3;
            addMessage('你在敌对帮派中安插了一个内应', 'success');
            showToast('内应就位！', 'success');
            break;
        }
        case 'provoke_enemy': {
            // 挑拨离间，削弱某个敌对
            const enemies = (state.enemies || []).filter(e => e.alive);
            if (enemies.length > 0) {
                const target = enemies[Math.floor(Math.random() * enemies.length)];
                target.power = Math.max(3, target.power - 5);
                addMessage('挑拨离间成功！' + target.name + ' 内部混乱，战力-5', 'success');
                showToast(target.name + ' 内部出现分裂', 'success');
            }
            break;
        }
    }
}

// 行动结束后有概率掉落道具
function rollItemDrop() {
    if (Math.random() > 0.2) return null;  // 20%概率掉落
    const drops = [
        { id: 'razor_hat', weight: 25 },
        { id: 'pocket_watch', weight: 10 },
        { id: 'moonshine', weight: 30 },
        { id: 'medkit', weight: 20 },
        { id: 'bribe_doc', weight: 5 },
        { id: 'black_umbrella', weight: 10 },
    ];
    const total = drops.reduce((s, d) => s + d.weight, 0);
    let r = Math.random() * total;
    for (const d of drops) {
        r -= d.weight;
        if (r <= 0) return d.id;
    }
    return null;
}

// 任务完成后检查道具掉落
function checkMissionDrop() {
    const itemId = rollItemDrop();
    if (!itemId) return null;
    const itemDef = CONFIG.ITEMS.find(i => i.id === itemId);
    if (!itemDef) return null;
    addItemToInventory(state, itemId);
    addMessage('任务中捡到了 ' + itemDef.emoji + itemDef.name + '！已放入背包', 'success');
    return itemId;
}

// 送礼给成员
function giftItem(invIdx, memberId) {
    if (!memberId) return;
    const m = state.crew.find(c => c.id === parseInt(memberId));
    if (!m) return;
    
    const inv = state.inventory[invIdx];
    if (!inv) return;
    
    const itemDef = CONFIG.ITEMS.find(i => i.id === inv.id);
    if (!itemDef) return;
    
    // 消耗一个道具
    inv.count = (inv.count || 1) - 1;
    if (inv.count <= 0) state.inventory.splice(invIdx, 1);
    
    // 忠诚度提升（根据道具价值）
    const loyaltyGain = Math.floor(itemDef.cost / 80) + 5;
    m.loyalty = Math.min(100, (m.loyalty || 50) + loyaltyGain);
    
    // 某些道具还有额外效果
    let extra = '';
    if (inv.id === 'razor_hat') {
        m.equipped = m.equipped || [];
        m.equipped.push('razor_hat');
        extra = ' 且装备上了';
    }
    
    showToast(m.emoji + m.name + ' 忠诚+' + loyaltyGain + extra, 'success');
    addMessage('赠送' + itemDef.emoji + itemDef.name + '给' + m.name + '，忠诚+' + loyaltyGain + extra, 'info');
    closeModal('inventoryModal');
    updateUI();
}

// 使用道具
function useItem(invIdx) {
    const inv = state.inventory[invIdx];
    if (!inv) return;
    const itemDef = CONFIG.ITEMS.find(i => i.id === inv.id);
    if (!itemDef) return;
    
    inv.count = (inv.count || 1) - 1;
    if (inv.count <= 0) state.inventory.splice(invIdx, 1);
    
    // 道具效果
    let msg = '';
    switch (inv.id) {
        case 'medkit':
            const injured = state.crew.filter(m => m.hp && m.hp < 80);
            if (injured.length > 0) {
                injured.forEach(m => m.hp = Math.min(100, (m.hp || 80) + 30));
                msg = '治疗了 ' + injured.length + ' 名受伤成员';
            } else {
                state.security = Math.min(100, state.security + 5);
                msg = '无成员受伤，提高了据点卫生安全';
            }
            break;
        case 'bribe_doc':
            state.influence += 10;
            msg = '影响力+10';
            break;
        case 'black_umbrella':
            state.notoriety = Math.max(0, state.notoriety - 10);
            msg = '恶名-10';
            break;
        case 'encrypted_phone':
            state._intelBoost = (state._intelBoost || 0) + 0.2;
            msg = '情报效率永久+20%';
            break;
        default:
            msg = '此道具不能直接使用，试试送给成员';
    }
    
    showToast(msg, 'info');
    addMessage('使用了' + itemDef.emoji + itemDef.name + ': ' + msg, 'info');
    closeModal('inventoryModal');
    updateUI();
}

    const pool = INTEL_RUMORS[tierKey] || INTEL_RUMORS.tier1;
    const rumor = pool[Math.floor(Math.random() * pool.length)];
    const credBonus = hasSpy ? 15 : 0;  // 情报员+15%可信度
    const credibility = Math.min(100, rumor.cred + credBonus + Math.floor(Math.random() * 10));
    
    const logEntry = {
        text: rumor.text,
        credibility: credibility,
        isTrap: rumor.trap && credibility < 50,  // 可信度低且是陷阱标记
        action: rumor.action || null,
        source: 'collect',
        turn: state.turn,
    };
    state._intelLog = state._intelLog || [];
    state._intelLog.unshift(logEntry);
    if (state._intelLog.length > 20) state._intelLog.pop();
    
    showToast('情报+' + gain + ' [' + credibility + '%可信]', 'info');
    addMessage('收集到情报: ' + rumor.text + ' (可信度' + credibility + '%)', 'info');
    updateUI();
    return true;
}

// 购买情报（一回合一次）
function buyIntel(state) {
    if (state._intelBuyCooldown && state._intelBuyCooldown > state.turn) {
        showToast('今日情报已买过，下回合再来', 'error');
        return;
    }
    if (state.money < 300) { showToast('需要$300', 'error'); return; }
    
    state.money -= 300;
    // 买的情报可信度随机，可能很低
    const tierKey = 'tier' + Math.min(state.intelLevel + 1, 4);
    const pool = INTEL_RUMORS[tierKey] || INTEL_RUMORS.tier1;
    const rumor = pool[Math.floor(Math.random() * pool.length)];
    const credibility = Math.max(15, rumor.cred - 20 + Math.floor(Math.random() * 30) - 15);
    
    const logEntry = {
        text: rumor.text,
        credibility: credibility,
        isTrap: credibility < 35,  // 可信度太低就当是假情报
        action: rumor.action || null,
        source: 'bought',
        turn: state.turn,
    };
    state._intelLog = state._intelLog || [];
    state._intelLog.unshift(logEntry);
    if (state._intelLog.length > 20) state._intelLog.pop();
    
    state._intelBuyCooldown = state.turn + 1;
    addIntel(state, 1 + Math.floor(Math.random() * 2));
    
    showToast('买来一条情报 ($300)', credibility < 35 ? 'error' : 'info');
    if (credibility < 30) {
        addMessage('黑市买的情报: ' + rumor.text + ' (可信度极低' + credibility + '%，可能是假消息)', 'error');
    } else {
        addMessage('黑市买的情报: ' + rumor.text + ' (可信度' + credibility + '%)', 'info');
    }
    updateUI();
}

// 执行情报触发的特殊行动（偷袭巢穴等）
function executeIntelAction(state, actionId) {
    // 消耗情报点数执行行动
    if (state.intel < 8) { showToast('情报不足(需8)', 'error'); return; }
    if (state.ap < 1) { showToast('行动力不足', 'error'); return; }
    
    state.intel -= 8;
    state.ap -= 1;
    
    // 检查该情报是否可能是陷阱（可信度低于35%时，行动必败且损失惨重）
    const recentIntel = (state._intelLog || []).filter(l => l.action === actionId);
    const isTrap = recentIntel.some(l => l.isTrap);
    
    let msg = '', success = false;
    const roll = Math.random();
    
    if (isTrap) {
        // 陷阱！敌军有埋伏
        const losses = 2 + Math.floor(Math.random() * 3);
        state.crew.filter(() => Math.random() < 0.3).forEach(m => { m.status = 'dead'; });
        const deadCount = state.crew.filter(m => m.status === 'dead').length;
        state.crew = state.crew.filter(m => m.status !== 'dead');
        state.manpower = state.crew.length;
        msg = '陷阱！这是敌对故意放出的假消息！你中了埋伏！损失' + deadCount + '名兄弟，幸存的忠诚度大降';
        state.crew.forEach(m => { m.loyalty = Math.max(5, m.loyalty - 25); });
        showToast('中了陷阱！损失惨重！', 'error');
        addMessage('💀 ' + msg, 'error');
        updateUI();
        return;
    }
    
    // 正常执行特殊行动
    switch (actionId) {
        case 'ambush_dock':
        case 'raid_steel':
            if (roll < 0.55) {
                const money = 500 + Math.floor(Math.random() * 500);
                state.money += money;
                state.influence += 8;
                msg = '偷袭成功！端掉敌对据点，缴获$' + money + '，影响力+8';
                success = true;
            } else {
                const loss = 1 + Math.floor(Math.random() * 2);
                state.crew.filter(() => Math.random() < 0.2).forEach(m => { m.status = 'dead'; });
                state.crew = state.crew.filter(m => m.status !== 'dead');
                state.manpower = state.crew.length;
                msg = '偷袭失败！损失' + loss + '人';
                success = false;
            }
            break;
        case 'expose_council':
            if (roll < 0.5) {
                state.influence += 15;
                state.money += 1000;
                msg = '拿到市议员的把柄！影响力+15，敲诈$1000';
                success = true;
            } else {
                state.security = Math.max(0, state.security - 15);
                msg = '事情败露，警方加强了对你的监控，安全度-15';
                success = false;
            }
            break;
        case 'port_heist':
            if (roll < 0.4) {
                state.money += 2000;
                state.notoriety += 15;
                msg = '港口大劫案成功！$2000到手，但恶名大涨';
                success = true;
            } else {
                state.crew.filter(() => Math.random() < 0.25).forEach(m => { m.status = 'dead'; });
                state.crew = state.crew.filter(m => m.status !== 'dead');
                state.manpower = state.crew.length;
                msg = '港口行动失败，遭遇埋伏！损失惨重';
                success = false;
            }
            break;
        case 'flip_enemy':
            if (roll < 0.6) {
                const nm = createNewMember(state);
                nm.loyalty = 35;
                state.crew.push(nm);
                state.manpower = state.crew.length;
                state.influence += 5;
                msg = '成功策反敌对成员！' + nm.name + '(' + nm.class + ')加入，但忠诚不高';
                success = true;
            } else {
                msg = '策反对象被灭口了';
                success = false;
            }
            break;
        default:
            msg = '该情报行动暂未实现';
    }
    
    addMessage('[情报行动] ' + msg, success ? 'success' : 'error');
    showToast(msg, success ? 'success' : 'error');
    updateUI();
}

// ===== 外交系统 v1 =====

// 初始化所有关系
function initDiplomacy(state) {
    const gangNames = ['码头帮', '黑水社', '暗影会', '铁血盟', '血手党', '夜枭团'];
    gangNames.forEach((name, i) => {
        // 弱小的帮派初始关系差，强大的初始中立偏负
        const baseRelation = -10 + i * 3;  // 排越后面越强，关系越差
        state.gangRelations[name] = baseRelation + Math.floor(Math.random() * 10) - 5;
    });
    state.policeRelation = -20 + Math.floor(Math.random() * 10);  // 初始跟警察关系冷淡
}

// 获取关系等级文本
function getRelationText(value) {
    if (value <= -80) return '死敌';
    if (value <= -50) return '敌对';
    if (value <= -20) return '紧张';
    if (value <= 0) return '冷淡';
    if (value <= 25) return '缓和';
    if (value <= 50) return '友好';
    if (value <= 75) return '信任';
    return '同盟';
}

function getRelationColor(value) {
    if (value <= -50) return '#f87171';
    if (value <= -20) return '#fb923c';
    if (value <= 0) return '#a1a1aa';
    if (value <= 25) return '#60a5fa';
    if (value <= 50) return '#34d399';
    return '#fbbf24';
}

// 主动改善帮派关系（送礼/谈判）
function improveGangRelation(state, gangName) {
    if (state._diplomacyCooldown > state.turn) {
        showToast('外交还在冷却中（剩' + (state._diplomacyCooldown - state.turn) + '回合）', 'error');
        return;
    }
    
    const enemies = (state.enemies || []).find(e => e.name === gangName);
    if (!enemies || !enemies.alive) { showToast(gangName + '已不存在', 'error'); return; }
    
    const currentRel = state.gangRelations[gangName] || 0;
    const powerDiff = (enemies.power || 10) - (state.level * 2 + state.crew.length);
    
    // 实力越弱，改善关系越难
    const baseCost = 500;
    const powerMalus = Math.max(0, powerDiff * 20);
    const relationMalus = Math.max(0, -currentRel * 3);
    const totalCost = baseCost + powerMalus + relationMalus;
    
    if (state.money < totalCost) {
        showToast('需要$' + totalCost + '（实力差惩罚+$' + powerMalus + '，关系差惩罚+$' + relationMalus + '）', 'error');
        return;
    }
    
    state.money -= totalCost;
    state._diplomacyCooldown = state.turn + 2;
    
    const baseChance = 0.4 + state.influence * 0.003;
    const powerMod = -Math.max(0, powerDiff * 0.01);
    const chance = Math.max(0.1, Math.min(0.9, baseChance + powerMod));
    
    if (Math.random() < chance) {
        const gain = 15 + Math.floor(Math.random() * 15);
        state.gangRelations[gangName] = Math.min(100, currentRel + gain);
        showToast(gangName + ' 关系+' + gain + '，当前:' + getRelationText(state.gangRelations[gangName]), 'success');
        addMessage('外交成功: 与' + gangName + '关系+' + gain + ' (花费$' + totalCost + ')', 'info');
    } else {
        state.gangRelations[gangName] = Math.max(-100, currentRel - 5);
        showToast(gangName + ' 拒绝了你的示好，关系反而恶化了', 'error');
        addMessage('外交失败: 与' + gangName + '关系-5', 'error');
    }
    updateUI();
}

// 提议联盟
function proposeAlliance(state, gangName) {
    if (state._diplomacyCooldown > state.turn) {
        showToast('外交冷却中', 'error'); return;
    }
    const rel = state.gangRelations[gangName] || 0;
    if (rel < 40) {
        showToast('关系不够好（需≥40，当前' + rel + '）', 'error'); return;
    }
    if (state.money < 2000) { showToast('需要$2000作为盟约金', 'error'); return; }
    
    state.money -= 2000;
    state._diplomacyCooldown = state.turn + 5;
    
    const chance = 0.3 + rel * 0.005;
    if (Math.random() < chance) {
        state.alliance = gangName;
        state.gangRelations[gangName] = Math.min(100, rel + 20);
        showToast('⭐ 与' + gangName + '结盟！同盟期限内不会互相攻击', 'success');
        addMessage('与' + gangName + '正式结盟！', 'success');
    } else {
        state.gangRelations[gangName] = Math.max(-100, rel - 15);
        showToast(gangName + '拒绝结盟，关系恶化', 'error');
        addMessage(gangName + '拒绝了联盟提议', 'error');
    }
    updateUI();
}

// 解除联盟
function breakAlliance(state) {
    if (!state.alliance) { showToast('没有盟友', 'error'); return; }
    state.gangRelations[state.alliance] = -40;
    addMessage('解除了与' + state.alliance + '的联盟', 'info');
    showToast('已解除联盟', 'info');
    state.alliance = null;
    updateUI();
}

// 改善警察关系
function improvePoliceRelation(state) {
    if (state._policeBribeCooldown > state.turn) {
        showToast('贿赂冷却中', 'error'); return;
    }
    const cost = 800 + Math.max(0, -state.policeRelation * 5);
    if (state.money < cost) { showToast('需要$' + cost, 'error'); return; }
    
    state.money -= cost;
    state._policeBribeCooldown = state.turn + 3;
    
    const chance = 0.5 + state.influence * 0.002;
    if (Math.random() < chance) {
        const gain = 10 + Math.floor(Math.random() * 10);
        state.policeRelation = Math.min(100, state.policeRelation + gain);
        state.security = Math.min(100, state.security + 5);
        showToast('警方关系+' + gain + '，安全度+5', 'success');
        addMessage('贿赂成功: 警方关系+' + gain, 'info');
    } else {
        state.policeRelation = Math.max(-100, state.policeRelation - 5);
        state.notoriety = Math.min(100, state.notoriety + 5);
        showToast('贿赂被拒！警方震怒，关系恶化', 'error');
        addMessage('贿赂警察失败，关系恶化', 'error');
    }
    updateUI();
}

// 每天更新关系
function updateDiplomacy(state) {
    // 警察关系影响安全度
    state.security = Math.max(5, Math.min(100, state.security + Math.floor(state.policeRelation * 0.05)));
    
    // 警察关系影响恶名衰减
    if (state.policeRelation > 0 && state.notoriety > 0) {
        state.notoriety = Math.max(0, state.notoriety - Math.floor(state.policeRelation * 0.02));
    }
    
    // 高恶名恶化警察关系
    if (state.notoriety > 50) {
        state.policeRelation = Math.max(-100, state.policeRelation - 1);
    }
    
    // 与警察关系好会恶化帮派关系
    if (state.policeRelation > 30) {
        Object.keys(state.gangRelations).forEach(gName => {
            state.gangRelations[gName] = Math.max(-100, state.gangRelations[gName] - 1);
        });
    }
    
    // 自然回复（小幅度向0靠拢）
    Object.keys(state.gangRelations).forEach(gName => {
        const r = state.gangRelations[gName];
        if (r < -20) state.gangRelations[gName] = Math.min(-20, r + 1);
        else if (r > 20) state.gangRelations[gName] = Math.max(20, r - 1);
    });
}

// 检查敌对行动（基于关系）
function checkEnemyAction(state) {
    const enemies = (state.enemies || []).filter(e => e.alive);
    if (enemies.length === 0) return null;
    
    // 关系最差的帮派最可能搞事
    let worstRel = 100, worstGang = enemies[0];
    enemies.forEach(e => {
        const rel = state.gangRelations[e.name] || 0;
        const r = rel - (e.power || 10) * 0.5;  // 越强越有底气搞事
        if (r < worstRel) { worstRel = r; worstGang = e; }
    });
    
    if (worstRel > -20) return null;  // 关系没差到动手的程度
    if (Math.random() > 0.15) return null;  // 15%概率
    
    return worstGang;
}

            html += '</div>';
        }
        html += '</div>';
    });
    
    // 警察关系
    html += '<div style="margin-top:8px;font-size:.7em;color:#a78bfa">👮 警方关系</div>';
    const pRel = state.policeRelation || 0;
    const pColor = getRelationColor(pRel);

    html += '<div style="border:1px solid #333;border-radius:6px;padding:6px 8px">';
    html += '<div style="display:flex;justify-content:space-between">';
    html += '<span style="font-weight:600;font-size:.7em">👮 警察局</span>';
    html += '<span style="color:' + pColor + ';font-size:.65em">' + pText + ' (' + pRel + ')</span>';
    html += '</div>';
    const pBar = (pRel + 100) / 2;
    html += '<div style="height:3px;background:#1e1e38;border-radius:2px;margin:3px 0;overflow:hidden">';
    html += '<div style="width:' + pBar + '%;height:100%;background:' + pColor + ';border-radius:2px"></div></div>';
    html += '<div style="display:flex;gap:4px;margin-top:3px">';
    const canBribe = state._policeBribeCooldown <= state.turn;
    html += '<button class="btn-sm" onclick="improvePoliceRelation(state);renderDiplomacyOverlay(state)" ' + (canBribe?'':'disabled') + ' style="font-size:.55em">💰 贿赂 (需$' + (800 + Math.max(0, -pRel * 5)) + ')</button>';

    html += '<div style="margin-top:6px;font-size:.6em;color:#555;line-height:1.6">';

    html += '💡 关系≤-20 → 敌对帮派可能主动搞事';

    html += '</div></div>';
    
    const old = document.getElementById('diplomacyModal');
    if (old) old.remove();
    document.body.insertAdjacentHTML('beforeend', html);
}

// 执行抢地盘战斗（选人模式）
function openDistrictBattle(districtId) {
    const dist = state.districts[districtId];
    if (!dist) return;
    if (dist.owner === 'player') { showToast('这是你的地盘', 'info'); return; }
    
    // 检查可用成员
    const available = state.crew.filter(m => m.status === 'idle');
    if (available.length < 5) {
        showToast('需要至少5名可用成员参加战斗！当前仅' + available.length + '人', 'error');
        return;
    }
    
    // 构建选人界面
    const enemyName = dist.owner === 'neutral' ? '本地守卫' : dist.enemyName || '敌对帮派';
    const defPower = dist.defense || 10;
    
    let html = '<div class="modal-overlay show" id="battleModal"><div class="modal-content">';
    html += '<div class="modal-header"><span>⚔️ 夺取 ' + dist.icon + ' ' + dist.name + '</span></div>';
    html += '<p style="font-size:.75em;color:#888;margin:4px 0">目标防御: ' + defPower + ' | 守方: ' + enemyName + '</p>';
    html += '<p style="font-size:.65em;color:#f87171;margin:4px 0">⚠ 至少选择5人，战斗有伤亡风险</p>';
    
    // 策略选择
    html += '<div style="margin:8px 0">';
    COMBAT_STRATEGIES.forEach((s, i) => {
