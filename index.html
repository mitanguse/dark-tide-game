function selectStrat(idx) {
    state._selectedBattleStrat = idx;
    document.querySelectorAll('.strat-option').forEach((el, i) => {
        el.style.borderColor = i === idx ? '#a78bfa' : '#333';
    });
}

function toggleBattleMember(memberId) {
    const idx = state._selectedBattleMembers.indexOf(memberId);
    if (idx >= 0) {
        state._selectedBattleMembers.splice(idx, 1);
    } else {
        const avail = state.crew.filter(m => m.status === 'idle');
        if (state._selectedBattleMembers.length >= avail.length) return;
        state._selectedBattleMembers.push(memberId);
    }
    updateBattleUI();
}

function updateBattleUI() {
    const count = state._selectedBattleMembers.length;
    const totalPower = state._selectedBattleMembers.reduce((s, id) => {
        const m = state.crew.find(c => c.id === id);
        return s + (m ? getMemberPower(m) : 0);
    }, 0);
    const el = document.getElementById('battle-count');
    const el2 = document.getElementById('battle-power');
    if (el) el.textContent = count;
    if (el2) el2.textContent = totalPower;
    
    // 高亮已选
    document.querySelectorAll('.crew-chip').forEach(chip => {
        const id = parseInt(chip.dataset.id);
        const selected = state._selectedBattleMembers.includes(id);
        chip.style.borderColor = selected ? '#34d399' : '#444';
        chip.style.background = selected ? 'rgba(52,211,153,0.1)' : 'transparent';
    });
}

// 执行战斗
function executeBattle(districtId) {
    const strat = COMBAT_STRATEGIES[state._selectedBattleStrat || 0];
    const members = state._selectedBattleMembers;
    
    if (!strat || !members || members.length < strat.manpowerMin) {
        showToast('至少选择' + strat.manpowerMin + '人！', 'error');
        return;
    }
    
    // 检查条件
    if (strat.intelCost && state.intel < strat.intelCost) {
        showToast('情报不足(需' + strat.intelCost + ')', 'error');
        return;
    }
    if (strat.requireBomber && !members.some(id => {
        const m = state.crew.find(c => c.id === id);
        return m && m.class === '爆破手';
    })) {
        showToast('需要爆破手参与！', 'error');
        return;
    }
    
    if (strat.intelCost) state.intel -= strat.intelCost;
    
    // 计算成功率
    const dist = state.districts[districtId];
    const defPower = dist.defense || 10;
    const totalPower = members.reduce((s, id) => {
        const m = state.crew.find(c => c.id === id);
        return s + (m ? getMemberPower(m) : 0);
    }, 0);
    
    let chance = strat.baseChance;
    chance += (totalPower - defPower) * 0.015;  // 战力差影响
    chance = Math.max(0.1, Math.min(0.9, chance));
    
    // 开战！
    closeBattle();
    
    const roll = Math.random();
    let msg = '';
    
    if (roll < chance) {
        // 胜利
        dist.owner = 'player';
        dist.defense = Math.max(3, Math.floor(defPower * 0.4));
        state.influence += 5 + Math.floor(Math.random() * 5);
        state.notoriety += 5;
        state.districtCount = Object.values(state.districts).filter(d => d.owner === 'player').length;
        
        // 胜利也有伤亡
        const casualtyCount = Math.floor(members.length * 0.1 * Math.random() * 2);
        for (let i = 0; i < casualtyCount; i++) {
            const idx = Math.floor(Math.random() * members.length);
            const mid = members[idx];
            const m = state.crew.find(c => c.id === mid);
            if (m && Math.random() < 0.3) {
                m.status = 'dead';
                msg += m.name + '阵亡... ';
            } else if (m) {
                m.loyalty = Math.max(5, m.loyalty - 5);
            }
        }
        
        const income = dist.income || 50;
        msg = '胜利！拿下' + dist.name + '！收入+' + income + '/回合' + (casualtyCount > 0 ? ' 但损失' + casualtyCount + '人' : '');
        showToast(msg, 'success');
    } else {
        // 失败 - 严重惩罚
        const casualtyRate = strat.failLoss || 0.3;
        const loyalDrop = strat.failLoyalDrop || 15;
        
        let deadCount = 0;
        members.forEach(mid => {
            const m = state.crew.find(c => c.id === mid);
            if (!m) return;
            if (Math.random() < casualtyRate * 0.6) {  // 阵亡概率
                m.status = 'dead';
                deadCount++;
            } else {
                m.loyalty = Math.max(5, m.loyalty - loyalDrop);
            }
        });
        
        // 最坏情况：全军覆没
        if (deadCount === members.length) {
            msg = '全军覆没！所有参战成员全部阵亡！你的组织遭受毁灭性打击！';
            showToast('全军覆没！！', 'error');
        } else {
            msg = '惨败！损失' + deadCount + '人，幸存的忠诚度大降' + loyalDrop + '点';
            showToast('惨败！损失' + deadCount + '人', 'error');
        }
        
        state.security = Math.max(0, state.security - 10);
        state.influence = Math.max(0, state.influence - 3);
    }
    
    // 清理阵亡
    state.crew = state.crew.filter(m => m.status !== 'dead');
    state.manpower = state.crew.length;
    
    addMessage('[战斗] ' + msg, roll < chance ? 'success' : 'error');
    updateUI();
}

function closeBattle() {
    const el = document.getElementById('battleModal');
    if (el) el.remove();
    state._selectedBattleStrat = undefined;
    state._selectedBattleMembers = undefined;
}

// 计算成员战力
function getMemberPower(m) {
    let power = m.lv * 2 + (m.stat || 5);
    if (m.equipped && m.equipped.includes('razor_hat')) power += Math.floor(power * 0.05);
    return power;
}

// ===== 地盘系统 =====

function getDailyIncome(state) {
    let income = 0;
    // 基础收入
    income += state.stronghold * 5;

    // 地盘收入
    for (const dId of Object.keys(state.districts)) {
        const d = state.districts[dId];
        const districtDef = CONFIG.DISTRICTS.find(dd => dd.id === dId);
        if (!districtDef) continue;
        let districtIncome = districtDef.baseIncome * (d.control / 100);
        // 职业加成
        const smugglers = countCrewByClass(state, '走私贩');
        districtIncome *= (1 + smugglers * 0.1);
        // 商业区加成
        if (dId === '商业区') districtIncome *= 1.25;
        // 港口区加成
        if (dId === '港口区') districtIncome *= 1.30;
        income += districtIncome;
    }

    // 额外加成
    if (state._incomeBoost) {
        income *= (1 + state._incomeBoost);
    }

    // 安全度过低会影响收入
    if (state.security < 30) {
        income *= 0.7;
    } else if (state.security < 50) {
        income *= 0.85;
    }

    return Math.floor(income);
}

function getUpgradeCost(currentLevel) {
    return 200 + currentLevel * 150;
}

function upgradeStronghold(state) {
    const cost = getUpgradeCost(state.stronghold);
    if (state.money < cost) {
        showToast(`资金不足! 需要 $${cost}`, 'error');
        return false;
    }
    if (state.stronghold >= 5) {
        showToast('据点等级已达上限!', 'info');
        return false;
    }
    state.money -= cost;
    state.stronghold++;
    state.security = Math.min(100, state.security + 10);
    addMessage(`🏢 据点升级! 等级 ${state.stronghold}`, 'success');
    showToast(`据点升级到 ${state.stronghold} 级`, 'success');
    updateUI();
    return true;
}

function collectDistrictIncome(state, districtId) {
    const d = state.districts[districtId];
    if (!d) return 0;

    const districtDef = CONFIG.DISTRICTS.find(dd => dd.id === districtId);
    if (!districtDef) return 0;

    let income = Math.floor(districtDef.baseIncome * (d.control / 100) * (1 + Math.random() * 0.3));
    income = Math.max(5, income);

    // 走私贩加成
    const smugglers = countCrewByClass(state, '走私贩');
    income = Math.floor(income * (1 + smugglers * 0.15));

    state.money += income;
    addMessage(`💰 ${districtId} 收入 +$${income}`, 'info');
    return income;
}

function defendDistrict(state, districtId) {
    const d = state.districts[districtId];
    if (!d) return;

    if (state.ap < 1) {
        showToast('行动力不足!', 'error');
        return;
    }

    if (!spendMoney(state, 50)) {
        showToast('资金不足!', 'error');
        return;
    }

    state.ap -= 1;
    d.security = Math.min(100, (d.security || 50) + 10);
    changeSecurity(state, 3);
    addMessage(`🛡️ 加强了 ${districtId} 的防御`, 'info');
    showToast(`${districtId} 防御提升`, 'success');
    updateUI();
}

function abandonDistrict(state, districtId) {
    if (!state.districts[districtId]) return;

    if (state.districtCount <= 1) {
        showToast('你至少需要保留一个地盘!', 'error');
        return;
    }

    const refund = 100 + Math.floor(Math.random() * 50);
    state.money += refund;
    delete state.districts[districtId];
    state.districtCount--;
    addInfluence(state, -3);
    addMessage(`🏚️ 放弃了 ${districtId}，获得 $${refund} 遣散费`, 'warning');
    showToast(`已放弃 ${districtId}`, 'info');
    updateUI();
}

// ---- 帮派敌对系统 ----
function getActiveGangs(state) {
    const gangs = [];
    for (let i = 0; i < CONFIG.GANGS.length; i++) {
        if (i < state.activeGangId) continue;
        const gang = CONFIG.GANGS[i];
        gangs.push({
            ...gang,
            hostility: Math.min(100, state.notoriety + state.districtCount * 5),
            index: i,
        });
    }
    return gangs;
}

function getGangHostility(gangIndex) {
    // 每个帮派的敌对度与玩家的恶名和势力范围相关
    return Math.min(100, G.notoriety + G.districtCount * 5 + gangIndex * 3);
}

let _currentTab = 'overview';

// ===== 初始化 =====
function startNewGame() {

// ===== 标签页切换 =====
function switchTab(tab) {
    _currentTab = tab;
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    switch (tab) {
        case 'overview': renderOverview(); break;
        case 'districts': renderDistrictsTab(); break;
        case 'intel': renderIntelTab(); break;
        case 'actions': renderActionsTab(); break;
        case 'crew': renderCrewTab(); break;
        case 'development': renderDevTab(); break;
    }
}

// ===== Toast =====
function showToast(text, type = 'info') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    toast.textContent = text;
    container.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2500);
}

// ===== 消息日志 =====
function addMessage(text, type = 'info') {
    const log = document.getElementById('messageLog');
    if (!log) return;
    const msg = document.createElement('div');
    msg.className = 'msg msg-' + type;
    msg.textContent = text;
    log.appendChild(msg);
    log.scrollTop = log.scrollHeight;
}

// ===== 更新UI =====
function updateUI() {
    if (!G) return;
    const el = (id, fn) => { const e = document.getElementById(id); if (e) fn(e); };
    el('resMoney', e => e.textContent = '$' + G.money);
    el('resManpower', e => e.textContent = G.crew.length);
    el('resIntel', e => e.textContent = G.intel);
    el('resInfluence', e => e.textContent = G.influence);
    el('resSecurity', e => e.textContent = G.security + '%');
    el('resNotoriety', e => e.textContent = G.notoriety);
    el('resStronghold', e => e.textContent = 'Lv.' + (G.baseLv || G.stronghold || 1));
    el('resDay', e => e.textContent = '第' + G.turn + '天');
    el('resLevel', e => e.textContent = 'Lv.' + G.level);
    el('resAp', e => {
        const cur = G.ap, max = G.maxAp || 4;
        e.textContent = cur + '/' + max;
        const fill = document.getElementById('apFill');
        if (fill) fill.style.width = (cur / max * 100) + '%';
    });
}

                <div style="font-size:10px;color:var(--text-secondary);">${unlocked ? mission.desc : '阶段' + (mission.phase + 1) + '解锁'}</div>
                ${unlocked ? `
                <div style="font-size:9px;color:var(--text-muted);margin:2px 0;">
                    需: ${mission.minCrew || 1}人 | 风险: ${mission.baseRisk}%
                </div>
                <button class="btn-sm ${canDo ? 'btn-gold' : 'btn-gray'}" 
                    onclick="openMissionSetup('${mission.id}')" ${canDo ? '' : 'disabled'}>
                    ${G.ap < 1 ? '行动力不足' : '⚡ 选人执行'}
                </button>
                ` : ''}
            </div>
        `;
    }
    html += '</div>';
    el.innerHTML = html;
}

// ===== 渲染: 成员（修复版，对齐实际属性名）=====
function renderCrewTab() {
    const el = document.getElementById('tabContent');
    if (!el) return;
    const available = G.crew.filter(m => m.status !== 'dead');

    let html = `
        <div class="card">
            <div class="flex-between">
                <span class="card-title">👥 成员管理</span>
                <span>${available.length} / ${G.crewSlots || 10}</span>
            </div>
            <div class="flex gap-8" style="flex-wrap:wrap;">
                <button class="btn-sm btn-purple" onclick="recruitMember(G);updateUI();" 
                    ${G.money >= 500 && available.length < (G.crewSlots || 10) ? '' : 'disabled'}>
                    🤝 招募 ($500)
                </button>
                <button class="btn-sm btn-green" onclick="openShop()">🏪 商店</button>
                <button class="btn-sm btn-gray" onclick="openInventory()">🎒 背包</button>
            </div>
        </div>
    `;

    if (available.length === 0) {
        html += '<div class="card"><p style="font-size:12px;color:var(--text-muted);padding:12px;text-align:center;">🤷 组织里空无一人<br><span style="font-size:11px;">点击招募按钮寻找伙伴</span></p></div>';
    } else {
        for (const member of available) {
            const mClass = member.className || member.class || '未知';
            const mLv = member.lv || 1;
            const mStat = member.stat || 5;
            const mLoyal = member.loyalty || 50;
            const mAp = member.ap || 3;
            const mMissions = member.missions || 0;
            const loyalColor = mLoyal < 30 ? 'var(--text-danger)' : mLoyal < 60 ? 'var(--text-warning)' : 'var(--text-success)';
            const statusText = member.status === 'idle' ? '🟢 空闲' : member.status === 'working' ? '🔵 任务中' : member.status === 'wounded' ? '🔴 受伤' : member.status === 'dead' ? '💀 阵亡' : '❓';

            html += `
                <div class="strategy-card" style="margin-bottom:4px;cursor:pointer;" onclick="showMemberDetail(G, ${member.id})">
                    <div class="flex-between">
                        <span>${member.emoji || '👤'} <strong>${member.name}</strong> <span style="font-size:10px;color:var(--text-secondary);">${mClass}</span></span>
                        <span style="font-size:10px;color:${loyalColor};">♥${mLoyal}</span>
                    </div>
                    <div style="font-size:10px;color:var(--text-secondary);margin:2px 0;">
                        Lv.${mLv} | ⚡${mStat} | ⏱${mAp} | 任务:${mMissions}次 | ${statusText}
                    </div>
                    <div style="height:2px;background:var(--bg-tertiary);border-radius:1px;overflow:hidden;">
                        <div style="height:100%;width:${mLoyal}%;background:${loyalColor};border-radius:1px;"></div>
                    </div>
                </div>
            `;
        }
    }

    // 职业统计
    const classCounts = {};
    for (const m of available) {
        const cls = m.className || m.class || '未知';
        classCounts[cls] = (classCounts[cls] || 0) + 1;
    }
    if (Object.keys(classCounts).length > 0) {
        html += '<div class="card"><div class="card-title">📊 职业分布</div><div class="flex gap-4" style="flex-wrap:wrap;">';
        for (const [cls, count] of Object.entries(classCounts)) {
            html += '<span style="font-size:10px;background:var(--bg-tertiary);padding:2px 8px;border-radius:10px;color:var(--text-secondary);">' + cls + ' x' + count + '</span>';
        }
        html += '</div></div>';
    }

    el.innerHTML = html;
}

// ===== 渲染: 发展 =====
function renderDevTab() {
    const el = document.getElementById('tabContent');
    if (!el) return;

    const upgCost = (G.baseLv || G.stronghold || 1) * 1000;
    const canUpg = G.money >= upgCost && G.crew.length >= 2;

    let html = `
        <div class="card">
            <div class="card-title">🏢 据点升级</div>
            <div style="font-size:11px;color:var(--text-secondary);">
                等级 ${G.baseLv || G.stronghold || 1} → 人手+3 · $${upgCost} · 需2人
            </div>
            <button class="btn-sm ${canUpg ? 'btn-gold' : 'btn-gray'}" onclick="if(canUpg){upgradeBase();updateUI();}" ${canUpg ? '' : 'disabled'}>扩建</button>
        </div>
        <div class="card">
            <div class="card-title">👮 贿赂警察</div>
            <div style="font-size:11px;color:var(--text-secondary);">$600 提升安全度</div>
            <button class="btn-sm ${G.money >= 600 ? 'btn-gold' : 'btn-gray'}" onclick="if(G.money>=600){bribePolice();updateUI();}" ${G.money >= 600 ? '' : 'disabled'}>贿赂</button>
        </div>
        <div class="card">
            <div class="card-title">🤝 外交关系</div>
            <div style="font-size:11px;color:var(--text-secondary);">查看和管理与其他势力的关系</div>
            <button class="btn-sm btn-purple" onclick="renderDiplomacyOverlay(G)">查看</button>
        </div>
        <div class="card">
            <div class="card-title">🎒 背包与商店</div>
            <div style="font-size:11px;color:var(--text-secondary);">管理道具和装备</div>
            <div class="flex gap-8">
                <button class="btn-sm btn-purple" onclick="openShop()">🏪 商店</button>
                <button class="btn-sm btn-gray" onclick="openInventory()">🎒 背包 (${(G.inventory||[]).length})</button>
            </div>
        </div>
        <div class="card">
            <div class="card-title">💾 存档管理</div>
            <div class="flex gap-8">
                <button class="btn-sm btn-green" onclick="saveGame(G);showToast('已保存','success')">💾 保存</button>
                <button class="btn-sm btn-gray" onclick="if(confirm('确定返回主菜单？')){deleteSave();location.reload()}">🚪 返回主菜单</button>
            </div>
        </div>
    `;
    el.innerHTML = html;
}

// ===== 进度推进 =====
function doNextDay() {
    if (!G) return;
    G.turn = (G.turn || 1) + 1;
    G.ap = G.maxAp || 4;
    resetAp(G);
    
    // 收入
    const income = getDailyIncome(G);
    G.money += income;
    addMessage('📅 第' + G.turn + '天 | 收入 +$' + income, 'info');
    
    // 外交关系更新
    if (typeof updateDiplomacy === 'function') updateDiplomacy(G);
    
    // 敌对行动
    if (G.turn % 2 === 0 && typeof checkEnemyAction === 'function') {
        const enemy = checkEnemyAction(G);
        if (enemy) {
            G.security = Math.max(0, G.security - 5);
            addMessage('⚡ ' + enemy.name + ' 趁夜色搞了破坏！安全度-5', 'error');
        }
    }
    
    // 随机事件（30%概率）
    if (Math.random() < 0.3 && typeof triggerRandomEvent === 'function') {
        triggerRandomEvent(G);
    }
    
    updateUI();
    if (_currentTab) switchTab(_currentTab);
}

// ===== 每日收入计算 =====
function getDailyIncome(state) {
    const count = Object.keys(state.districts || {}).length;
    return state.baseLv * 30 + count * 20 + state.influence * 2 + 10;
}

// ===== 对话事件触发 =====
function triggerRandomEvent(state) {
    const eventKeys = Object.keys(EVENTS);
    if (eventKeys.length === 0) return;
    const key = eventKeys[Math.floor(Math.random() * eventKeys.length)];
    const event = EVENTS[key];
    if (!event) return;
    if (event.phase && event.phase > (state.phase || 0)) return;
    if (state.triggeredEvents && state.triggeredEvents.includes(key)) return;
    _currentEvent = event;
    showEventModal(event);
}

// ===== 事件弹窗 =====
function showEventModal(event) {
    let choicesHtml = '';
    let validChoices = 0;
    for (let i = 0; i < event.choices.length; i++) {
        const c = event.choices[i];
        let canChoose = true;
        if (c.req) {
            if (c.req.money && G.money < c.req.money) canChoose = false;
            if (c.req.intel && G.intel < c.req.intel) canChoose = false;
            if (c.req.manpower && G.crew.length < c.req.manpower) canChoose = false;
        }
        const costText = c.cost && c.cost.money ? ' ($' + c.cost.money + ')' : '';
        choicesHtml += `<button class="btn-choice ${canChoose ? 'btn-gold' : 'btn-gray'}" onclick="handleEventChoice(${i})" ${canChoose ? '' : 'disabled'}>
            ${c.text}${costText}
        </button>`;
        if (canChoose) validChoices++;
    }

    const modalHtml = `
        <div class="modal-overlay show" id="eventModal">
            <div class="event-modal">
                <div class="event-header" style="background: linear-gradient(135deg, #6d28d9, #1e1b4b);">
                    <span class="event-icon">⚡</span>
                    <h2>${event.title}</h2>
                </div>
                <div class="event-body">
                    <div class="event-desc">${event.desc}</div>
                    <div class="event-choices">
                        ${choicesHtml}
                    </div>
                </div>
            </div>
        </div>
    `;

    const old = document.getElementById('eventModal');
    if (old) old.remove();
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

// ===== 键盘快捷键 =====
document.addEventListener('DOMContentLoaded', () => {
    if (hasSave()) {
        const btn = document.getElementById('continueBtn');
        if (btn) btn.style.display = 'block';
    }
});

document.addEventListener('keydown', (e) => {
    if (!G || G.isGameOver) return;
    switch (e.key) {
        case '1': switchTab('overview'); break;
        case '2': switchTab('districts'); break;
        case '3': switchTab('intel'); break;
        case '4': switchTab('actions'); break;
        case '5': switchTab('crew'); break;
        case '6': switchTab('development'); break;
        case ' ': e.preventDefault(); doNextDay(); break;
        case 's': if (e.ctrlKey) { saveGame(G); showToast('已保存', 'success'); } break;
        case 'Escape':
            document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
            break;
    }
});

console.log('🎮 快捷键: 1-6 切换标签 | Space 下一天 | Ctrl+S 保存 | Esc 关闭弹窗');
